services:
  - type: web
    name: currano-farms
    runtime: node
    plan: starter
    buildCommand: |
      npm install --include=dev
      cd svelte-app && npm install --include=dev && npm run build
    startCommand: node server/index.js
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: SERVE_DIR
        value: svelte-app/build
